name: Jekyll Pages (disabled — use Vite workflow)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "This workflow is intentionally inactive."
          echo "Deploy GardenWise from: Deploy GardenWise (Vite) → GitHub Pages (pages.yml on push to main)."
