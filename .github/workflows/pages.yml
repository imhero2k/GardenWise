name: Deploy RootVio (Vite) → GitHub Pages

on:
  push:
    branches: [main, iteration1, iteration2]
  workflow_dispatch:

# Use Node 24 for JS-based actions (removes Node 20 deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://tcal5txtn8.execute-api.ap-southeast-2.amazonaws.com
      # Pl@ntNet Identify from the browser (key baked into bundle — expose + authorized domains in Pl@ntNet).
      VITE_PLANTNET_API_KEY: ${{ secrets.VITE_PLANTNET_API_KEY }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      # https://rootivio.app/iteration1/ — built from branch iteration1.
      - name: Build /iteration1/ from iteration1
        env:
          VITE_BASE_PATH: /iteration1/
        run: |
          set -e
          git fetch origin iteration1
          git checkout -B __pages_iteration1 origin/iteration1
          npm ci
          npm run typecheck && npm run lint
          npm run build

      - name: Stage iteration1
        run: |
          mkdir -p pages-root/iteration1
          cp -r dist/* pages-root/iteration1/

      # https://rootivio.app/iteration2/ — built from branch iteration2.
      - name: Build /iteration2/ from iteration2
        env:
          VITE_BASE_PATH: /iteration2/
        run: |
          set -e
          git fetch origin iteration2
          git checkout -B __pages_iteration2 origin/iteration2
          npm ci
          npm run typecheck && npm run lint
          npm run build

      - name: Stage iteration2
        run: |
          mkdir -p pages-root/iteration2
          cp -r dist/* pages-root/iteration2/

      # https://rootivio.app/ (stable production root) — built from branch iteration2, alternate base path.
      - name: Build site root from iteration2
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Stage iteration2 at Pages root
        run: |
          mkdir -p pages-root
          cp -r dist/* pages-root/
          if [ -f CNAME ]; then cp CNAME pages-root/; fi

      # https://rootivio.app/iteration3/ — built from main (current / “next”).
      - name: Build /iteration3/ from main
        env:
          VITE_BASE_PATH: /iteration3/
        run: |
          set -e
          git fetch origin main
          git checkout -B __pages_main origin/main
          npm ci
          npm run typecheck && npm run lint
          npm run build

      - name: Stage iteration3
        run: |
          mkdir -p pages-root/iteration3
          cp -r dist/* pages-root/iteration3/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: pages-root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
