name: Deploy GardenWise (Vite) → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Use Node 24 for JS-based actions (removes Node 20 deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install, check, and build
        env:
          VITE_BASE_PATH: /GardenWise/
          VITE_API_BASE_URL: https://tcal5txtn8.execute-api.ap-southeast-2.amazonaws.com
        run: npm ci && npm run typecheck && npm run lint && npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
