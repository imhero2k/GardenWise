[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # VITE_* env vars are inlined into the client bundle by design
  # (Vite only exposes vars prefixed with VITE_ to client code), so they
  # are not secret. Tell Netlify's secret scanner to skip them.
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_BASE_URL,VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_APP_ID,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MEASUREMENT_ID"

# SPA routing: serve index.html for any unknown path so React Router can handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
